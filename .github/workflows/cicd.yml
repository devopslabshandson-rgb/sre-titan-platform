name: CI-CD to AKS (Blue-Green Ready)

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: devsecops-app

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: AzureCredentials   # 👈 IMPORTANT

    steps:

    # 1️⃣ Checkout Code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Azure Login
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 3️⃣ Login to ACR
    - name: Login to ACR
      run: |
        az acr login --name ${{ secrets.ACR_NAME }}

    # 4️⃣ Setup Docker Buildx (IMPORTANT FIX)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 5️⃣ Build & Push Image (AMD64 FIX)
    - name: Build and Push Image
      run: |
        docker buildx build \
          --platform linux/amd64 \
          -t ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --push .

    # 6️⃣ Get AKS Credentials
    - name: Get AKS Credentials
      run: |
        az aks get-credentials \
          --resource-group ${{ secrets.RESOURCE_GROUP }} \
          --name ${{ secrets.AKS_NAME }} \
          --overwrite-existing

    # 7️⃣ Decide Blue or Green
    - name: Decide Deployment Color
      id: color
      run: |
        CURRENT=$(kubectl get svc devsecops-service -o jsonpath='{.spec.selector.version}' 2>/dev/null || echo "blue")

        if [ "$CURRENT" = "blue" ]; then
          echo "color=green" >> $GITHUB_OUTPUT
        else
          echo "color=blue" >> $GITHUB_OUTPUT
        fi

    # 8️⃣ Ensure Deployment Exists
    - name: Ensure Deployment Exists
      run: |
        COLOR=${{ steps.color.outputs.color }}

        kubectl get deployment devsecops-$COLOR || \
        kubectl apply -f k8s/deployment-$COLOR.yaml

    # 9️⃣ Update Deployment Image
    - name: Update Deployment Image
      run: |
        COLOR=${{ steps.color.outputs.color }}

        kubectl set image deployment/devsecops-$COLOR \
        app=${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

    # 🔟 Wait for rollout
    - name: Wait for rollout
      run: |
        COLOR=${{ steps.color.outputs.color }}
        kubectl rollout status deployment/devsecops-$COLOR

    # 1️⃣1️⃣ Switch Traffic
    - name: Switch Service
      run: |
        COLOR=${{ steps.color.outputs.color }}

        kubectl patch service devsecops-service \
        -p "{\"spec\":{\"selector\":{\"app\":\"devsecops\",\"version\":\"$COLOR\"}}}"
