name: CI-CD to AKS (Blue-Green Ready)

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: devsecops-app

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Azure Login
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: >
          {
            "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
          }

    # 3️⃣ ACR Login
    - name: Login to ACR
      run: |
        az acr login --name ${{ secrets.ACR_NAME }}

    # 4️⃣ Build Docker Image
    - name: Build Image
      run: |
        docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .

    # 5️⃣ Push Image
    - name: Push Image
      run: |
        docker push ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

    # 6️⃣ Get AKS Credentials
    - name: Get AKS Credentials
      run: |
        az aks get-credentials \
          --resource-group ${{ secrets.RESOURCE_GROUP }} \
          --name ${{ secrets.AKS_NAME }} \
          --overwrite-existing

    # 7️⃣ Decide Blue or Green
    - name: Decide Deployment Color
      id: color
      run: |
        CURRENT=$(kubectl get svc devsecops-service -o jsonpath='{.spec.selector.version}')
        if [ "$CURRENT" = "blue" ]; then
          echo "color=green" >> $GITHUB_OUTPUT
        else
          echo "color=blue" >> $GITHUB_OUTPUT
        fi

    # 8️⃣ Update Deployment Image
    - name: Update Deployment
      run: |
        COLOR=${{ steps.color.outputs.color }}

        kubectl set image deployment/devsecops-$COLOR \
        app=${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

    # 9️⃣ Wait for rollout
    - name: Wait for rollout
      run: |
        COLOR=${{ steps.color.outputs.color }}
        kubectl rollout status deployment/devsecops-$COLOR

    # 🔟 Switch Traffic (Blue → Green or vice versa)
    - name: Switch Service
      run: |
        COLOR=${{ steps.color.outputs.color }}

        kubectl patch service devsecops-service \
        -p "{\"spec\":{\"selector\":{\"app\":\"devsecops\",\"version\":\"$COLOR\"}}}"
